<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b65d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f9cf7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f9d58;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icono: Cubo 3D estilizado (representa inventario) -->
  <g transform="translate(10, 10)">
    <!-- Cara frontal -->
    <path d="M20 35 L50 20 L80 35 L80 70 L50 85 L20 70 Z" fill="url(#grad1)" opacity="0.9"/>
    <!-- Cara superior -->
    <path d="M50 20 L80 35 L50 50 L20 35 Z" fill="#4f9cf7" opacity="0.7"/>
    <!-- Cara derecha -->
    <path d="M80 35 L80 70 L50 85 L50 50 Z" fill="#0e4bad" opacity="0.8"/>
    <!-- Líneas internas (detalle) -->
    <line x1="50" y1="50" x2="50" y2="85" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="35" x2="50" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="35" x2="50" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <!-- Checkmark (representa gestión/organización) -->
    <circle cx="50" cy="48" r="12" fill="url(#grad2)" opacity="0.95"/>
    <polyline points="43,48 48,53 57,44" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Texto SIGEM -->
  <text x="115" y="62" font-family="'DM Sans', sans-serif" font-size="48" font-weight="700" fill="#0b1d3a" letter-spacing="-1.5">
    SIGEM
  </text>

  <!-- Línea decorativa -->
  <rect x="115" y="72" width="60" height="3" rx="1.5" fill="url(#grad1)"/>

  <!-- Subtítulo -->
  <text x="115" y="95" font-family="'DM Sans', sans-serif" font-size="16" font-weight="500" fill="#5f6b7a" letter-spacing="0.5">
    TecNM Veracruz
  </text>
</svg>